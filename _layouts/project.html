---
layout: default
---
<article class="project-page">
  <header class="project-hero">
    <div class="container">
      <a href="{{ '/#projects' | relative_url }}" class="back-link">&larr; All projects</a>
      <div class="project-tools-header">
        {% for tool in page.tools %}
        <span class="tag">{{ tool }}</span>
        {% endfor %}
      </div>
      <h1>{{ page.title }}</h1>
      <p class="project-tagline-hero">{{ page.tagline }}</p>
      <div class="outcome-callout">
        <span class="outcome-icon">&#x2713;</span>
        <div>
          <strong>{{ page.outcome_headline }}</strong>
          {% if page.outcome_detail %}<p>{{ page.outcome_detail }}</p>{% endif %}
        </div>
      </div>
    </div>
  </header>

  <div class="project-body container">
    {{ content }}
  </div>
</article>
